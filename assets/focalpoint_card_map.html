
<div style="background:#0f1117;width:100%;padding:0;margin:0;font-family:system-ui,sans-serif;position:relative;overflow:hidden;">
<canvas id="mapCanvas" width="1280" height="720" style="width:100%;display:block;"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
const W = 1280, H = 720;

ctx.fillStyle = '#0f1117';
ctx.fillRect(0,0,W,H);

const projection = d3.geoNaturalEarth1()
  .scale(195)
  .translate([W/2 + 20, H/2 + 30]);

const path = d3.geoPath(projection, ctx);

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r => r.json())
  .then(world => {
    const countries = topojson.feature(world, world.objects.countries);

    ctx.beginPath();
    path(countries);
    ctx.fillStyle = '#1a1f2e';
    ctx.fill();
    ctx.strokeStyle = '#252b3d';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    const zones = [
      {name:'Gaza',      lat:31.35, lng:34.3,  color:'#7c3aed', r:10, severity:'CRITICAL'},
      {name:'Palestine', lat:31.9,  lng:35.2,  color:'#7c3aed', r:10, severity:'CRITICAL'},
      {name:'Israel',    lat:31.5,  lng:34.75, color:'#7c3aed', r:10, severity:'CRITICAL'},
      {name:'Syria',     lat:34.8,  lng:38.9,  color:'#7c3aed', r:10, severity:'CRITICAL'},
      {name:'Ukraine',   lat:48.4,  lng:31.2,  color:'#7c3aed', r:10, severity:'CRITICAL'},
      {name:'Iran',      lat:32.4,  lng:53.7,  color:'#f59e0b', r:8,  severity:'AMBER'},
      {name:'Yemen',     lat:15.5,  lng:47.5,  color:'#ef4444', r:8,  severity:'RED'},
      {name:'Sudan',     lat:15.0,  lng:30.2,  color:'#ef4444', r:8,  severity:'RED'},
      {name:'Myanmar',   lat:19.8,  lng:96.1,  color:'#f59e0b', r:8,  severity:'AMBER'},
    ];

    zones.forEach(z => {
      const [x,y] = projection([z.lng, z.lat]);
      ctx.beginPath();
      ctx.arc(x, y, z.r * 2, 0, Math.PI*2);
      ctx.fillStyle = z.color + '22';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x, y, z.r * 1.3, 0, Math.PI*2);
      ctx.fillStyle = z.color + '44';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x, y, z.r * 0.7, 0, Math.PI*2);
      ctx.fillStyle = z.color;
      ctx.fill();
    });

    ctx.fillStyle = '#ffffff';
    ctx.font = '700 72px system-ui';
    ctx.fillText('FocalPoint', 60, 120);

    ctx.fillStyle = '#8892a4';
    ctx.font = '400 24px system-ui';
    ctx.fillText('Real-time conflict intelligence for field journalists', 62, 158);

    ctx.fillStyle = '#7c3aed';
    ctx.fillRect(62, 540, 12, 12);
    ctx.fillStyle = '#8892a4';
    ctx.font = '400 20px system-ui';
    ctx.fillText('CRITICAL', 82, 552);

    ctx.fillStyle = '#ef4444';
    ctx.fillRect(180, 540, 12, 12);
    ctx.fillStyle = '#8892a4';
    ctx.fillText('RED', 200, 552);

    ctx.fillStyle = '#f59e0b';
    ctx.fillRect(252, 540, 12, 12);
    ctx.fillStyle = '#8892a4';
    ctx.fillText('AMBER', 272, 552);

    ctx.fillStyle = '#4b5563';
    ctx.font = '400 18px system-ui';
    ctx.fillText('Powered by Gemma 4 · GDELT · CPJ · RSF · Ollama', 62, 600);

    ctx.fillStyle = '#4b5563';
    ctx.font = '400 16px system-ui';
    ctx.textAlign = 'right';
    ctx.fillText('9 conflict zones monitored', W - 60, 660);
    ctx.textAlign = 'left';

    ctx.strokeStyle = '#252b3d';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(62, 520);
    ctx.lineTo(400, 520);
    ctx.stroke();
  });
</script>
</div>
